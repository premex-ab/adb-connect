name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          check-latest: true
      - name: Mint GitHub App token for Homebrew tap
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.PREMEX_BOT_APP_ID }}
          private-key: ${{ secrets.PREMEX_BOT_APP_PRIVATE_KEY }}
          owner: premex-ab
          repositories: homebrew-tap

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ steps.app-token.outputs.token }}

  android:
    name: android
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v4

      - name: Derive VERSION from tag
        id: ver
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          v="${REF_NAME#v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        working-directory: android-app
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon

      - name: Stage APK artefacts
        id: stage
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p stage
          src=android-app/app/build/outputs/apk/release/app-release.apk
          apk="adb-gate-${VERSION}.apk"
          cp "$src" "stage/$apk"
          cd stage
          sha=$(sha256sum "$apk" | awk '{print $1}')
          printf '%s  %s\n' "$sha" "$apk" > "${apk}.sha256"
          echo "apk=$apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK + checksum to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          APK: ${{ steps.stage.outputs.apk }}
        run: |
          cd stage
          gh release upload "$TAG" \
            "$APK" \
            "${APK}.sha256" \
            --repo "${{ github.repository }}" --clobber
